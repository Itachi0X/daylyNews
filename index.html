<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Widget Temps Immersif</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #050505;
            color: white;
            margin: 0;
            overflow: hidden;
        }

        .glass-card {
            background: rgba(15, 15, 18, 0.7);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Horloge Géante en arrière-plan */
        .giant-bg-time {
            font-size: 18vw;
            font-weight: 800;
            line-height: 1;
            color: rgba(255, 255, 255, 0.03);
            pointer-events: none;
            user-select: none;
            white-space: nowrap;
            filter: blur(var(--blur-amount, 10px));
            transition: filter 0.3s ease;
        }

        .time-foreground {
            font-weight: 600;
            letter-spacing: -0.05em;
        }

        .fade-in {
            animation: fadeIn 0.8s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Slider personnalisé */
        input[type=range] {
            -webkit-appearance: none;
            background: transparent;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 2px;
            background: rgba(255, 255, 255, 0.1);
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 12px;
            width: 12px;
            border-radius: 50%;
            background: white;
            margin-top: -5px;
            cursor: pointer;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 relative">

    <!-- ARRIÈRE-PLAN : SECONDES ET MS GÉANTES -->
    <div class="absolute inset-0 flex items-center justify-center overflow-hidden z-0">
        <div id="giant-clock" class="giant-bg-time uppercase tabular-nums">00.000</div>
    </div>

    <!-- BACKGROUND IMAGE FLOU -->
    <div id="bg-overlay" class="absolute inset-0 opacity-10 bg-cover bg-center blur-[80px] scale-110 transition-all duration-1000 z-0"></div>

    <div id="main-widget" class="relative z-10 w-full max-w-[580px] rounded-[3rem] glass-card shadow-2xl overflow-hidden cursor-pointer group">
        
        <!-- HEADER : HEURE ET MINUTES -->
        <div class="pt-10 px-10 flex justify-between items-start">
            <div class="flex flex-col">
                <div class="text-[10px] uppercase tracking-[0.4em] text-white/30 font-bold mb-1">Système Temporel</div>
                <div id="foreground-time" class="text-6xl time-foreground tabular-nums">00:00</div>
            </div>
            
            <div class="text-right">
                <div id="current-date" class="text-[10px] uppercase tracking-[0.2em] text-white/40 font-bold">--/--/--</div>
                <div id="category-label" class="text-[9px] text-white/20 mt-1 italic">Analyse de données insolites</div>
            </div>
        </div>

        <!-- IMAGE PRINCIPALE -->
        <div class="relative h-[220px] w-full mt-6 px-6 overflow-hidden">
            <div class="w-full h-full rounded-[2rem] overflow-hidden relative border border-white/5">
                <img id="header-img" src="" alt="" class="w-full h-full object-cover opacity-80 transition-transform duration-[2000ms] group-hover:scale-105">
                <div class="absolute inset-0 bg-gradient-to-t from-[#0f0f12] via-transparent to-transparent"></div>
            </div>
        </div>

        <!-- CONTENU POST -->
        <div class="px-10 pb-8 mt-4 relative z-10">
            <div class="min-h-[140px] space-y-3">
                <h2 id="info-title" class="text-2xl font-bold text-white/90 leading-tight fade-in">Chargement...</h2>
                <p id="info-text" class="text-base font-light text-white/50 leading-relaxed line-clamp-3 fade-in">Recherche d'informations improbables...</p>
            </div>

            <!-- BOUTON ET SLIDER DE FLOU -->
            <div class="mt-8 flex items-center justify-between">
                <button class="bg-white text-black px-6 py-2.5 rounded-full text-sm font-bold hover:scale-105 transition-all active:scale-95">
                    Détails
                </button>
                
                <!-- Contrôle du flou -->
                <div class="flex flex-col items-end gap-2 group/slider">
                    <span class="text-[8px] uppercase tracking-widest text-white/20 group-hover/slider:text-white/40 transition-colors">Ajuster le flou</span>
                    <input type="range" id="blur-slider" min="0" max="60" value="15" class="w-32 opacity-30 group-hover/slider:opacity-100 transition-opacity">
                </div>
            </div>
        </div>
    </div>

    <script>
        const DISPLAY_DURATION = 15000;
        let timer = null;

        // GESTION DU TEMPS (Premier plan et Arrière-plan flou)
        const blurSlider = document.getElementById('blur-slider');
        const giantClock = document.getElementById('giant-clock');

        blurSlider.addEventListener('input', (e) => {
            document.documentElement.style.setProperty('--blur-amount', `${e.target.value}px`);
        });

        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            const ms = String(now.getMilliseconds()).padStart(3, '0');
            
            const d = String(now.getDate()).padStart(2, '0');
            const mo = String(now.getMonth() + 1).padStart(2, '0');
            const y = now.getFullYear();

            // Premier plan : Heures et Minutes uniquement
            document.getElementById('foreground-time').innerText = `${h}:${m}`;
            
            // Arrière-plan flou : Secondes et Millisecondes
            giantClock.innerText = `${s}.${ms}`;
            
            document.getElementById('current-date').innerText = `${d}/${mo}/${y}`;
            
            requestAnimationFrame(updateClock);
        }

        const FACTS = [
            {
                title: "Le concert du silence",
                text: "En 2011, un concert de 4'33\" a été donné sans aucune note jouée. Le but était d'écouter les sons naturels de l'environnement.",
                bgImage: 'https://images.unsplash.com/photo-1470225620780-dba8ba36b745?auto=format&fit=crop&w=900&q=80'
            },
            {
                title: "Radeaux de fourmis",
                text: "Les fourmis de feu créent des structures vivantes en se tenant les unes aux autres pour flotter lors des inondations.",
                bgImage: 'https://images.unsplash.com/photo-1559530412-f02758220516?auto=format&fit=crop&w=900&q=80'
            },
            {
                title: "Pluies de Diamants",
                text: "Sur Neptune, la pression atmosphérique est telle que le carbone se transforme en diamants et tombe littéralement du ciel.",
                bgImage: 'https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?auto=format&fit=crop&w=900&q=80'
            },
            {
                title: "L'Horloge de 10 000 ans",
                text: "Construite dans le désert du Texas, cette horloge géante ne tintera qu'une fois par millénaire pour marquer le temps long.",
                bgImage: 'https://images.unsplash.com/photo-1508962914676-134849a727f0?auto=format&fit=crop&w=900&q=80'
            },
            {
                title: "Miel Millénaire",
                text: "Le miel trouvé dans les tombeaux antiques reste comestible après 3000 ans. Un aliment théoriquement éternel.",
                bgImage: 'https://images.unsplash.com/photo-1587049352846-4a222e784d38?auto=format&fit=crop&w=900&q=80'
            }
        ];

        async function updateWidget() {
            const fact = FACTS[Math.floor(Math.random() * FACTS.length)];
            
            const titleEl = document.getElementById('info-title');
            const textEl = document.getElementById('info-text');
            const progress = document.getElementById('progress');

            titleEl.style.opacity = '0';
            textEl.style.opacity = '0';
            
            setTimeout(() => {
                document.getElementById('bg-overlay').style.backgroundImage = `url(${fact.bgImage})`;
                document.getElementById('header-img').src = fact.bgImage;
                titleEl.innerText = fact.title;
                textEl.innerText = fact.text;
                
                lucide.createIcons();

                titleEl.style.opacity = '1';
                textEl.style.opacity = '1';
            }, 500);

            if (timer) clearTimeout(timer);
            timer = setTimeout(updateWidget, DISPLAY_DURATION);
        }

        document.getElementById('main-widget').addEventListener('click', updateWidget);

        window.onload = () => {
            requestAnimationFrame(updateClock);
            lucide.createIcons();
            updateWidget();
            // Appliquer le flou initial
            document.documentElement.style.setProperty('--blur-amount', '15px');
        };
    </script>
</body>
</html>
