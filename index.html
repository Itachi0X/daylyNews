<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Widget Info Magique</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0a0a;
            color: white;
            margin: 0;
            overflow: hidden;
        }

        .glass-card {
            background: rgba(24, 24, 27, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-card:hover {
            background: rgba(24, 24, 27, 0.7);
            transform: scale(1.01);
        }

        .progress-bar {
            height: 2px;
            width: 0%;
            transition: width 12s linear;
        }

        .fade-in {
            animation: fadeIn 0.8s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .blur-bg {
            transition: background-image 1s ease-in-out, filter 1s ease-in-out;
        }

        /* Masquer la barre de défilement */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 relative">

    <!-- Background dynamique flouté -->
    <div id="bg-overlay" class="absolute inset-0 opacity-20 bg-cover bg-center blur-[40px] scale-110 blur-bg"></div>

    <div id="main-widget" class="relative z-10 w-full max-w-[580px] rounded-[2.5rem] glass-card shadow-2xl overflow-hidden cursor-pointer">
        
        <!-- En-tête avec Image -->
        <div class="relative h-[220px] w-full overflow-hidden bg-zinc-800">
            <img id="header-img" src="" alt="" class="w-full h-full object-cover transition-all duration-1000 scale-100">
            
            <!-- ZONE MAGIQUE : Badge cliquable -->
            <div id="secret-badge" class="absolute top-5 left-5 flex items-center gap-2 bg-black/50 backdrop-blur-xl px-4 py-1.5 rounded-full border border-white/10 active:scale-95 transition-transform select-none cursor-pointer">
                <i id="category-icon" data-lucide="sparkles" class="w-3.5 h-3.5"></i>
                <span id="category-label" class="text-[10px] font-bold tracking-[0.15em] text-white uppercase">Chargement...</span>
                <div id="pulse-hint" class="absolute inset-0 bg-white/10 rounded-full hidden animate-pulse"></div>
            </div>

            <div class="absolute bottom-0 left-0 right-0 h-24 bg-gradient-to-t from-zinc-900 to-transparent"></div>
        </div>

        <!-- Contenu -->
        <div class="px-10 pb-10 pt-4">
            <div class="min-h-[120px] flex items-center justify-center">
                <p id="info-text" class="text-xl md:text-2xl font-light text-white/90 leading-relaxed text-center fade-in">
                    Initialisation du flux...
                </p>
            </div>

            <!-- Barre de progression et Footer -->
            <div class="mt-10 space-y-5">
                <div class="h-[2px] w-full bg-white/5 rounded-full overflow-hidden">
                    <div id="progress" class="h-full bg-gradient-to-r from-indigo-500 to-purple-500 w-0"></div>
                </div>
                
                <div class="flex justify-between items-center text-[9px] font-bold text-white/30 uppercase tracking-[0.2em]">
                    <div class="flex items-center gap-3">
                        <div class="flex items-center gap-1.5 text-indigo-400">
                            <i data-lucide="languages" class="w-3 h-3"></i>
                            <span>IA Traduction</span>
                        </div>
                        <span class="h-3 w-[1px] bg-white/10"></span>
                        <span id="status-label">Flux Direct</span>
                    </div>
                    <div class="flex items-center gap-1.5">
                        <span>Passer l'info</span>
                        <i data-lucide="external-link" class="w-2.5 h-2.5"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const apiKey = ""; // La clé est injectée par l'environnement
        const DISPLAY_DURATION = 12000;
        let secretCount = 0;
        let lastClickTime = 0;
        let timer = null;

        const CATEGORIES = {
            weather: {
                label: 'Météo Locale',
                icon: 'cloud-sun',
                color: 'from-cyan-400 to-blue-500',
                bgImage: 'https://images.unsplash.com/photo-1561484930-998b6a7b22e8?auto=format&fit=crop&w=900&q=80',
                fetch: async () => {
                    const r = await fetch("https://api.open-meteo.com/v1/forecast?latitude=43.2965&longitude=5.3698&current_weather=true");
                    const d = await r.json();
                    return `Il fait actuellement ${d.current_weather.temperature}°C à Marseille, avec un ciel dégagé.`;
                }
            },
            tech: {
                label: 'Actualité Tech',
                icon: 'cpu',
                color: 'from-indigo-400 to-blue-600',
                bgImage: 'https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&w=900&q=80',
                fetch: async () => {
                    const ids = await fetch("https://hacker-news.firebaseio.com/v0/topstories.json").then(r => r.json());
                    const id = ids[Math.floor(Math.random() * 20)];
                    const article = await fetch(`https://hacker-news.firebaseio.com/v0/item/${id}.json`).then(r => r.json());
                    return await translateToFrench(article.title);
                }
            },
            space: {
                label: 'Espace & Cosmos',
                icon: 'rocket',
                color: 'from-purple-500 to-fuchsia-500',
                bgImage: 'https://images.unsplash.com/photo-1462331940025-496dfbfc7564?auto=format&fit=crop&w=900&q=80',
                fetch: async () => {
                    try {
                        const r = await fetch("https://api.nasa.gov/planetary/apod?api_key=DEMO_KEY");
                        const d = await r.json();
                        return await translateToFrench(d.title);
                    } catch (e) {
                        return "Observation d'une nébuleuse lointaine dans le secteur de Persée.";
                    }
                }
            }
        };

        async function translateToFrench(text) {
            if (!text || !apiKey) return text;
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Traduis ce texte en français de manière fluide et naturelle, garde uniquement la traduction : "${text}"` }] }]
                    })
                });
                const result = await response.json();
                return result.candidates?.[0]?.content?.parts?.[0]?.text || text;
            } catch (error) { return text; }
        }

        async function updateWidget() {
            const keys = Object.keys(CATEGORIES);
            const cat = CATEGORIES[keys[Math.floor(Math.random() * keys.length)]];
            
            // Animation de sortie
            document.getElementById('info-text').style.opacity = '0';
            document.getElementById('progress').style.transition = 'none';
            document.getElementById('progress').style.width = '0%';
            
            // UI Update
            document.getElementById('bg-overlay').style.backgroundImage = `url(${cat.bgImage})`;
            document.getElementById('header-img').src = cat.bgImage;
            document.getElementById('category-label').innerText = cat.label;
            document.getElementById('category-icon').setAttribute('data-lucide', cat.icon);
            document.getElementById('progress').className = `h-full bg-gradient-to-r ${cat.color}`;
            lucide.createIcons();

            try {
                const content = await cat.fetch();
                document.getElementById('info-text').innerText = content;
            } catch (e) {
                document.getElementById('info-text').innerText = "La curiosité est le moteur de toute découverte.";
            }

            // Animation d'entrée
            document.getElementById('info-text').style.opacity = '1';
            
            // Restart progress
            setTimeout(() => {
                document.getElementById('progress').style.transition = `width ${DISPLAY_DURATION}ms linear`;
                document.getElementById('progress').style.width = '100%';
            }, 50);

            if (timer) clearTimeout(timer);
            timer = setTimeout(updateWidget, DISPLAY_DURATION);
        }

        // Gestion de l'Easter Egg
        document.getElementById('secret-badge').addEventListener('click', (e) => {
            e.stopPropagation();
            const now = Date.now();
            if (now - lastClickTime > 1000) {
                secretCount = 1;
            } else {
                secretCount++;
                if (secretCount === 4) {
                    document.getElementById('pulse-hint').classList.remove('hidden');
                }
                if (secretCount === 5) {
                    window.location.href = "page/1.html";
                }
            }
            lastClickTime = now;
        });

        // Click sur le widget pour changer
        document.getElementById('main-widget').addEventListener('click', updateWidget);

        // Initialisation
        window.onload = () => {
            lucide.createIcons();
            updateWidget();
        };
    </script>
</body>
</html>
