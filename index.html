<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Widget Temps Immersif - Données Réelles</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #050505;
            color: white;
            margin: 0;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        .glass-card {
            background: rgba(15, 15, 18, 0.7);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: border 0.3s ease, transform 0.1s ease;
        }

        /* Horloge Géante en arrière-plan */
        .giant-bg-time {
            font-size: 18vw;
            font-weight: 800;
            line-height: 1;
            color: rgba(255, 255, 255, 0.03);
            pointer-events: none;
            user-select: none;
            white-space: nowrap;
            filter: blur(var(--blur-amount, 10px));
            transition: filter 0.3s ease;
        }

        .time-foreground {
            font-weight: 600;
            letter-spacing: -0.05em;
        }

        .fade-in {
            animation: fadeIn 0.8s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Slider personnalisé */
        input[type=range] {
            -webkit-appearance: none;
            background: transparent;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 2px;
            background: rgba(255, 255, 255, 0.1);
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 12px;
            width: 12px;
            border-radius: 50%;
            background: white;
            margin-top: -5px;
            cursor: pointer;
        }

        #main-widget {
            position: absolute;
            cursor: grab;
            user-select: none;
        }

        #main-widget:active {
            cursor: grabbing;
        }

        .loading-shimmer {
            background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.05) 50%, rgba(255,255,255,0) 100%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
    </style>
</head>
<body class="relative h-screen w-screen">

    <!-- ARRIÈRE-PLAN : SECONDES ET MS GÉANTES -->
    <div class="absolute inset-0 flex items-center justify-center overflow-hidden z-0">
        <div id="giant-clock" class="giant-bg-time uppercase tabular-nums">00.000</div>
    </div>

    <!-- BACKGROUND IMAGE FLOU -->
    <div id="bg-overlay" class="absolute inset-0 opacity-10 bg-cover bg-center blur-[80px] scale-110 transition-all duration-1000 z-0"></div>

    <!-- WIDGET DEPLACABLE -->
    <div id="main-widget" class="z-10 w-full max-w-[580px] rounded-[3rem] glass-card shadow-2xl overflow-hidden group">
        
        <!-- HEADER : HEURE ET MINUTES -->
        <div class="pt-10 px-10 flex justify-between items-start">
            <div class="flex flex-col">
                <div class="text-[10px] uppercase tracking-[0.4em] text-white/30 font-bold mb-1">Système Temporel</div>
                <div id="foreground-time" class="text-6xl time-foreground tabular-nums">00:00</div>
            </div>
            
            <div class="text-right">
                <div id="current-date" class="text-[10px] uppercase tracking-[0.2em] text-white/40 font-bold">--/--/--</div>
                <div id="category-label" class="text-[9px] text-white/20 mt-1 italic uppercase tracking-wider">Source : Wikipédia</div>
            </div>
        </div>

        <!-- IMAGE PRINCIPALE -->
        <div class="relative h-[220px] w-full mt-6 px-6 overflow-hidden">
            <div id="img-container" class="w-full h-full rounded-[2rem] overflow-hidden relative border border-white/5 bg-zinc-900">
                <img id="header-img" src="" alt="" class="w-full h-full object-cover opacity-0 transition-all duration-1000 group-hover:scale-105">
                <div id="img-placeholder" class="absolute inset-0 loading-shimmer"></div>
                
                <!-- BOUTON SECRET -->
                <div id="secret-badge" class="absolute top-5 left-5 flex items-center gap-2 bg-black/60 backdrop-blur-xl px-4 py-2 rounded-full border border-white/10 active:scale-95 transition-transform select-none cursor-pointer z-20">
                    <i id="category-icon" data-lucide="shield-check" class="w-4 h-4 text-white"></i>
                    <span id="category-label-text" class="text-[10px] font-bold tracking-[0.2em] text-white uppercase">Savoir</span>
                    <div id="pulse-hint" class="absolute inset-0 bg-white/10 rounded-full hidden animate-pulse"></div>
                </div>

                <div class="absolute inset-0 bg-gradient-to-t from-[#0f0f12] via-transparent to-transparent"></div>
            </div>
        </div>

        <!-- CONTENU POST -->
        <div class="px-10 pb-8 mt-4 relative z-10 pointer-events-auto">
            <div class="min-h-[140px] space-y-3">
                <h2 id="info-title" class="text-2xl font-bold text-white/90 leading-tight fade-in">Initialisation...</h2>
                <p id="info-text" class="text-base font-light text-white/50 leading-relaxed line-clamp-3 fade-in">Récupération des connaissances mondiales...</p>
            </div>

            <!-- BOUTON ET SLIDER DE FLOU -->
            <div class="mt-8 flex items-center justify-between">
                <button id="next-btn" class="bg-white text-black px-6 py-2.5 rounded-full text-sm font-bold hover:scale-105 transition-all active:scale-95 flex items-center gap-2">
                    <i data-lucide="refresh-cw" class="w-4 h-4" id="refresh-icon"></i>
                    Découvrir
                </button>
                
                <div class="flex flex-col items-end gap-2 group/slider">
                    <span class="text-[8px] uppercase tracking-widest text-white/20 group-hover/slider:text-white/40 transition-colors">Ajuster le flou</span>
                    <input type="range" id="blur-slider" min="0" max="60" value="15" class="w-32 opacity-30 group-hover/slider:opacity-100 transition-opacity">
                </div>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURATION ET ÉTAT
        const DISPLAY_DURATION = 20000; // Un peu plus long pour lire le contenu réel
        let timer = null;
        let secretCount = 0;
        let lastClickTime = 0;

        // DRAG AND DROP DU WIDGET
        const widget = document.getElementById('main-widget');
        let isDragging = false;
        let offsetX, offsetY;

        // Centrage initial
        widget.style.left = '50%';
        widget.style.top = '50%';
        widget.style.transform = 'translate(-50%, -50%)';

        widget.addEventListener('mousedown', (e) => {
            if (e.target.closest('input') || e.target.closest('button') || e.target.closest('#secret-badge')) return;
            isDragging = true;
            const rect = widget.getBoundingClientRect();
            offsetX = e.clientX - rect.left;
            offsetY = e.clientY - rect.top;
            widget.style.transform = 'none';
        });

        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            widget.style.left = `${e.clientX - offsetX}px`;
            widget.style.top = `${e.clientY - offsetY}px`;
        });

        document.addEventListener('mouseup', () => {
            isDragging = false;
        });

        // GESTION DU TEMPS
        const blurSlider = document.getElementById('blur-slider');
        const giantClock = document.getElementById('giant-clock');

        blurSlider.addEventListener('input', (e) => {
            document.documentElement.style.setProperty('--blur-amount', `${e.target.value}px`);
        });

        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            const ms = String(now.getMilliseconds()).padStart(3, '0');
            
            document.getElementById('foreground-time').innerText = `${h}:${m}`;
            giantClock.innerText = `${s}.${ms}`;
            document.getElementById('current-date').innerText = now.toLocaleDateString('fr-FR');
            
            requestAnimationFrame(updateClock);
        }

        // APPEL API WIKIPÉDIA (DONNÉES RÉELLES)
        async function fetchRealData() {
            const refreshIcon = document.getElementById('refresh-icon');
            if(refreshIcon) refreshIcon.classList.add('animate-spin');

            try {
                // Étape 1 : Récupérer un article aléatoire avec extrait et image
                // On utilise l'API Wikimedia REST pour obtenir un "random summary"
                const response = await fetch('https://fr.wikipedia.org/api/rest_v1/page/random/summary');
                const data = await response.json();

                const titleEl = document.getElementById('info-title');
                const textEl = document.getElementById('info-text');
                const imgEl = document.getElementById('header-img');
                const bgOverlay = document.getElementById('bg-overlay');
                const placeholder = document.getElementById('img-placeholder');

                // Animation de sortie
                titleEl.style.opacity = '0';
                textEl.style.opacity = '0';
                imgEl.style.opacity = '0';

                setTimeout(() => {
                    titleEl.innerText = data.title;
                    textEl.innerText = data.extract || "Pas de description disponible pour cet article.";
                    
                    // Gestion de l'image (si disponible)
                    const imgUrl = data.originalimage ? data.originalimage.source : `https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&w=900&q=80`;
                    
                    imgEl.src = imgUrl;
                    imgEl.onload = () => {
                        imgEl.style.opacity = '0.8';
                        placeholder.style.opacity = '0';
                    };
                    
                    bgOverlay.style.backgroundImage = `url(${imgUrl})`;
                    
                    // Animation d'entrée
                    titleEl.style.opacity = '1';
                    textEl.style.opacity = '1';
                    if(refreshIcon) refreshIcon.classList.remove('animate-spin');
                }, 400);

            } catch (error) {
                console.error("Erreur API:", error);
                document.getElementById('info-title').innerText = "Erreur de connexion";
                document.getElementById('info-text').innerText = "Impossible de joindre Wikipédia pour le moment. Veuillez réessayer.";
                if(refreshIcon) refreshIcon.classList.remove('animate-spin');
            }

            if (timer) clearTimeout(timer);
            timer = setTimeout(fetchRealData, DISPLAY_DURATION);
        }

        // BOUTON SECRET
        document.getElementById('secret-badge').addEventListener('click', (e) => {
            e.stopPropagation();
            const now = Date.now();
            if (now - lastClickTime > 1000) {
                secretCount = 1;
            } else {
                secretCount++;
                if (secretCount === 4) document.getElementById('pulse-hint').classList.remove('hidden');
                if (secretCount === 5) {
                    document.body.style.filter = 'invert(1) hue-rotate(180deg)';
                    setTimeout(() => document.body.style.filter = 'none', 3000);
                    secretCount = 0;
                    document.getElementById('pulse-hint').classList.add('hidden');
                }
            }
            lastClickTime = now;
        });

        document.getElementById('next-btn').addEventListener('click', (e) => {
            e.stopPropagation();
            fetchRealData();
        });

        window.onload = () => {
            requestAnimationFrame(updateClock);
            lucide.createIcons();
            fetchRealData();
            document.documentElement.style.setProperty('--blur-amount', '15px');
        };
    </script>
</body>
</html>
