<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Widget Temps Immersif - Données Réelles</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #050505;
            color: white;
            margin: 0;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        .glass-card {
            background: rgba(15, 15, 18, 0.7);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: border 0.3s ease, transform 0.1s ease;
        }

        .giant-bg-time {
            font-size: 18vw;
            font-weight: 800;
            line-height: 1;
            color: rgba(255, 255, 255, 0.03);
            pointer-events: none;
            user-select: none;
            white-space: nowrap;
            filter: blur(var(--blur-amount, 10px));
            transition: filter 0.3s ease;
        }

        .time-foreground {
            font-weight: 600;
            letter-spacing: -0.05em;
        }

        .fade-in {
            animation: fadeIn 0.8s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        input[type=range] {
            -webkit-appearance: none;
            background: transparent;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 2px;
            background: rgba(255, 255, 255, 0.1);
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 12px;
            width: 12px;
            border-radius: 50%;
            background: white;
            margin-top: -5px;
            cursor: pointer;
        }

        #main-widget {
            position: absolute;
            cursor: grab;
            user-select: none;
        }

        #main-widget:active {
            cursor: grabbing;
        }

        .loading-shimmer {
            background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.05) 50%, rgba(255,255,255,0) 100%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
    </style>
</head>
<body class="relative h-screen w-screen transition-all duration-700">

    <!-- ARRIÈRE-PLAN -->
    <div class="absolute inset-0 flex items-center justify-center overflow-hidden z-0">
        <div id="giant-clock" class="giant-bg-time uppercase tabular-nums">00.000</div>
    </div>

    <div id="bg-overlay" class="absolute inset-0 opacity-10 bg-cover bg-center blur-[80px] scale-110 transition-all duration-1000 z-0"></div>

    <!-- WIDGET -->
    <div id="main-widget" class="z-10 w-full max-w-[580px] rounded-[3rem] glass-card shadow-2xl overflow-hidden group">
        
        <!-- HEADER -->
        <div class="pt-8 px-10 flex justify-between items-start">
            <div class="flex flex-col">
                <div id="system-label" class="text-[10px] uppercase tracking-[0.4em] text-white/30 font-bold mb-1">Système Temporel</div>
                <div id="foreground-time" class="text-6xl time-foreground tabular-nums">00:00</div>
            </div>
            
            <div class="text-right flex flex-col items-end">
                <div id="current-date" class="text-[10px] uppercase tracking-[0.2em] text-white/40 font-bold mb-2">--/--/--</div>
                <!-- Sélecteur de langue manuel -->
                <div class="flex gap-2 bg-white/5 p-1 rounded-full border border-white/10">
                    <button onclick="setLanguage('fr')" class="w-6 h-6 text-[10px] rounded-full hover:bg-white/10 transition-colors">FR</button>
                    <button onclick="setLanguage('en')" class="w-6 h-6 text-[10px] rounded-full hover:bg-white/10 transition-colors">EN</button>
                    <button onclick="setLanguage('zh')" class="w-6 h-6 text-[10px] rounded-full hover:bg-white/10 transition-colors">中</button>
                </div>
            </div>
        </div>

        <!-- IMAGE -->
        <div class="relative h-[220px] w-full mt-6 px-6 overflow-hidden">
            <div id="img-container" class="w-full h-full rounded-[2rem] overflow-hidden relative border border-white/5 bg-zinc-900">
                <img id="header-img" src="" alt="" class="w-full h-full object-cover opacity-0 transition-all duration-1000 group-hover:scale-105">
                <div id="img-placeholder" class="absolute inset-0 loading-shimmer"></div>
                
                <!-- BOUTON SECRET -->
                <div id="secret-badge" class="absolute top-5 left-5 flex items-center gap-2 bg-black/60 backdrop-blur-xl px-4 py-2 rounded-full border border-white/10 active:scale-95 transition-transform select-none cursor-pointer z-20">
                    <i id="category-icon" data-lucide="shield-check" class="w-4 h-4 text-white"></i>
                    <span id="secret-label" class="text-[10px] font-bold tracking-[0.2em] text-white uppercase">Savoir</span>
                    <div id="pulse-hint" class="absolute inset-0 bg-white/20 rounded-full hidden animate-pulse"></div>
                </div>

                <div class="absolute inset-0 bg-gradient-to-t from-[#0f0f12] via-transparent to-transparent"></div>
            </div>
        </div>

        <!-- CONTENU -->
        <div class="px-10 pb-8 mt-4 relative z-10 pointer-events-auto">
            <div class="min-h-[140px] space-y-3">
                <h2 id="info-title" class="text-2xl font-bold text-white/90 leading-tight fade-in">...</h2>
                <p id="info-text" class="text-base font-light text-white/50 leading-relaxed line-clamp-3 fade-in">...</p>
            </div>

            <!-- ACTIONS -->
            <div class="mt-8 flex items-center justify-between">
                <div class="flex gap-3">
                    <button id="next-btn" class="bg-white text-black px-6 py-2.5 rounded-full text-sm font-bold hover:scale-105 transition-all active:scale-95 flex items-center gap-2">
                        <i data-lucide="refresh-cw" class="w-4 h-4" id="refresh-icon"></i>
                        <span id="btn-next-text">Découvrir</span>
                    </button>
                    <a id="source-link" href="#" target="_blank" class="bg-white/10 text-white px-6 py-2.5 rounded-full text-sm font-bold hover:bg-white/20 transition-all active:scale-95 flex items-center gap-2 backdrop-blur-md border border-white/10">
                        <i data-lucide="external-link" class="w-4 h-4"></i>
                        <span id="btn-source-text">Voir plus</span>
                    </a>
                </div>
                
                <div class="flex flex-col items-end gap-2 group/slider">
                    <span id="blur-label" class="text-[8px] uppercase tracking-widest text-white/20 group-hover/slider:text-white/40 transition-colors">Flou</span>
                    <input type="range" id="blur-slider" min="0" max="60" value="15" class="w-32 opacity-30 group-hover/slider:opacity-100 transition-opacity">
                </div>
            </div>
        </div>
    </div>

    <script>
        // TRADUCTIONS
        const i18n = {
            fr: {
                system: "Système Temporel",
                secret: "Savoir",
                next: "Découvrir",
                source: "Voir plus",
                blur: "Ajuster le flou",
                loading: "Initialisation...",
                desc: "Récupération des connaissances...",
                error: "Erreur de connexion"
            },
            en: {
                system: "Temporal System",
                secret: "Knowledge",
                next: "Discover",
                source: "Read more",
                blur: "Adjust blur",
                loading: "Initializing...",
                desc: "Fetching global knowledge...",
                error: "Connection error"
            },
            zh: {
                system: "时间系统",
                secret: "知识",
                next: "探索",
                source: "查看更多",
                blur: "调整模糊",
                loading: "正在初始化...",
                desc: "正在获取全球知识...",
                error: "连接错误"
            }
        };

        let currentLang = 'fr';
        const DISPLAY_DURATION = 20000;
        let timer = null;
        let secretCount = 0;
        let lastClickTime = 0;

        // DETECTION LANGUE
        function initLanguage() {
            const browserLang = navigator.language.toLowerCase();
            if (browserLang.includes('zh')) currentLang = 'zh';
            else if (browserLang.includes('en')) currentLang = 'en';
            else currentLang = 'fr';
            updateStaticTexts();
        }

        function setLanguage(lang) {
            currentLang = lang;
            updateStaticTexts();
            fetchRealData();
        }

        function updateStaticTexts() {
            const t = i18n[currentLang];
            document.getElementById('system-label').innerText = t.system;
            document.getElementById('secret-label').innerText = t.secret;
            document.getElementById('btn-next-text').innerText = t.next;
            document.getElementById('btn-source-text').innerText = t.source;
            document.getElementById('blur-label').innerText = t.blur;
        }

        // DRAG AND DROP
        const widget = document.getElementById('main-widget');
        let isDragging = false;
        let offsetX, offsetY;

        widget.style.left = '50%';
        widget.style.top = '50%';
        widget.style.transform = 'translate(-50%, -50%)';

        widget.addEventListener('mousedown', (e) => {
            if (e.target.closest('input') || e.target.closest('button') || e.target.closest('a') || e.target.closest('#secret-badge')) return;
            isDragging = true;
            const rect = widget.getBoundingClientRect();
            offsetX = e.clientX - rect.left;
            offsetY = e.clientY - rect.top;
            widget.style.transform = 'none';
        });

        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            widget.style.left = `${e.clientX - offsetX}px`;
            widget.style.top = `${e.clientY - offsetY}px`;
        });

        document.addEventListener('mouseup', () => isDragging = false);

        // HORLOGE
        const blurSlider = document.getElementById('blur-slider');
        const giantClock = document.getElementById('giant-clock');

        blurSlider.addEventListener('input', (e) => {
            document.documentElement.style.setProperty('--blur-amount', `${e.target.value}px`);
        });

        function updateClock() {
            const now = new Date();
            document.getElementById('foreground-time').innerText = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
            giantClock.innerText = `${String(now.getSeconds()).padStart(2, '0')}.${String(now.getMilliseconds()).padStart(3, '0')}`;
            document.getElementById('current-date').innerText = now.toLocaleDateString(currentLang === 'zh' ? 'zh-CN' : (currentLang === 'en' ? 'en-US' : 'fr-FR'));
            requestAnimationFrame(updateClock);
        }

        // API WIKIPEDIA
        async function fetchRealData() {
            const refreshIcon = document.getElementById('refresh-icon');
            if(refreshIcon) refreshIcon.classList.add('animate-spin');

            try {
                // Utilise la langue actuelle pour l'API
                const response = await fetch(`https://${currentLang}.wikipedia.org/api/rest_v1/page/random/summary`);
                const data = await response.json();

                const titleEl = document.getElementById('info-title');
                const textEl = document.getElementById('info-text');
                const imgEl = document.getElementById('header-img');
                const bgOverlay = document.getElementById('bg-overlay');
                const sourceLink = document.getElementById('source-link');
                const placeholder = document.getElementById('img-placeholder');

                titleEl.style.opacity = '0';
                textEl.style.opacity = '0';
                imgEl.style.opacity = '0';

                setTimeout(() => {
                    titleEl.innerText = data.title;
                    textEl.innerText = data.extract || i18n[currentLang].desc;
                    sourceLink.href = data.content_urls.desktop.page;
                    
                    const imgUrl = data.originalimage ? data.originalimage.source : `https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&w=900&q=80`;
                    
                    imgEl.src = imgUrl;
                    imgEl.onload = () => {
                        imgEl.style.opacity = '0.8';
                        placeholder.style.opacity = '0';
                    };
                    bgOverlay.style.backgroundImage = `url(${imgUrl})`;
                    
                    titleEl.style.opacity = '1';
                    textEl.style.opacity = '1';
                    if(refreshIcon) refreshIcon.classList.remove('animate-spin');
                }, 400);

            } catch (error) {
                document.getElementById('info-title').innerText = i18n[currentLang].error;
                if(refreshIcon) refreshIcon.classList.remove('animate-spin');
            }

            if (timer) clearTimeout(timer);
            timer = setTimeout(fetchRealData, DISPLAY_DURATION);
        }

        // BOUTON SECRET ET REDIRECTION
        document.getElementById('secret-badge').addEventListener('click', (e) => {
            e.stopPropagation();
            const now = Date.now();
            if (now - lastClickTime > 1000) {
                secretCount = 1;
            } else {
                secretCount++;
                if (secretCount === 4) document.getElementById('pulse-hint').classList.remove('hidden');
                if (secretCount === 5) {
                    // Effet visuel
                    document.body.style.filter = 'invert(1) hue-rotate(180deg)';
                    // Redirection vers /page/1.html après un court délai
                    setTimeout(() => {
                        window.location.href = "page/1.html";
                    }, 1500);
                    secretCount = 0;
                }
            }
            lastClickTime = now;
        });

        document.getElementById('next-btn').addEventListener('click', (e) => {
            e.stopPropagation();
            fetchRealData();
        });

        window.onload = () => {
            initLanguage();
            requestAnimationFrame(updateClock);
            lucide.createIcons();
            fetchRealData();
            document.documentElement.style.setProperty('--blur-amount', '15px');
        };
    </script>
</body>
</html>
